<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- スマホ専用なので、画面幅にぴったり合わせる設定 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CROSSMIX</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ============================================================ -->
  <!-- 画面1：一覧画面（メイン）                                     -->
  <!-- ============================================================ -->
  <div id="list-screen" class="screen">

    <!-- ヘッダー：ロゴ ＋ 右上の「登録する」ボタン -->
    <header class="app-header">
      <h1 class="logo">CROSSMIX</h1>
      <button id="open-form-btn" class="btn-primary header-btn">登録する</button>
    </header>

    <!-- タグ別セクションが入る場所。中身は functions.js が並べる -->
    <main id="sections" class="sections">

      <!-- セクションとカードは functions.js が自動で並べる（リアルタイム表示） -->

    </main>
  </div>


  <!-- ============================================================ -->
  <!-- 画面2：プロフィール登録フォーム（最初は隠れている）            -->
  <!-- ============================================================ -->
  <div id="form-screen" class="screen hidden">

    <!-- フォームのヘッダー：戻るボタン -->
    <header class="app-header form-header">
      <button id="close-form-btn" class="back-btn" aria-label="戻る">←</button>
      <h2 class="form-title">プロフィール登録</h2>
    </header>

    <!-- 入力フォーム本体 -->
    <form id="profile-form" class="profile-form">

      <!-- 写真 -->
      <label class="field-label">写真</label>
      <div class="photo-upload">
        <!-- カメラアイコンの丸（タップで画像選択） -->
        <label for="photo-input" class="photo-circle">
          <span class="camera-icon">📷</span>
        </label>
        <!-- 実際のファイル選択（見えないようにしておく） -->
        <input type="file" id="photo-input" accept="image/*" hidden>
      </div>

      <!-- 名前（必須） -->
      <label class="field-label">名前 <span class="required">*</span></label>
      <input type="text" id="name-input" class="text-input" placeholder="ニックネームでもOK">

      <!-- 所属 -->
      <label class="field-label">所属</label>
      <input type="text" id="affiliation-input" class="text-input" placeholder="会社名・団体名など">

      <!-- 一言 -->
      <label class="field-label">一言</label>
      <textarea id="comment-input" class="text-input textarea" placeholder="あなたについて教えてください"></textarea>

      <!-- タグ（1つだけ選択） -->
      <label class="field-label">タグ</label>
      <div id="tag-list" class="tag-list">
        <!-- タグのボタンは functions.js が TAGS 配列から自動で並べる -->
      </div>

      <!-- SNSリンク -->
      <label class="field-label">SNSリンク</label>
      <input type="url" id="twitter-input" class="text-input" placeholder="Twitter / X">
      <input type="url" id="instagram-input" class="text-input" placeholder="Instagram">
      <input type="url" id="linkedin-input" class="text-input" placeholder="LinkedIn">
      <input type="url" id="facebook-input" class="text-input" placeholder="Facebook">

      <!-- HPリンク -->
      <label class="field-label">HPリンク</label>
      <input type="url" id="url-input" class="text-input" placeholder="https://example.com">

      <!-- 登録ボタン -->
      <button type="submit" class="btn-primary submit-btn">登録する</button>
    </form>
  </div>


  <!-- ============================================================ -->
  <!-- 詳細モーダル（最初は隠れている。中身は functions.js が作る） -->
  <!-- ============================================================ -->
  <div id="detail-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <!-- ここに詳細の中身が入る -->
    </div>
  </div>


  <!-- ============================================================ -->
  <!-- 読み込むファイルたち                                          -->
  <!-- ============================================================ -->

  <!-- jQuery（外部から読み込み。$(...) という書き方が使えるようになる） -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- ============================================================ -->
  <!-- Firebaseに接続する（モジュール版）                            -->
  <!-- ============================================================ -->
  <script type="module">
  // Firebase本体と、Firestore（データの保存場所）を読み込む
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getFirestore } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  // 自分のプロジェクトとつなぐための設定（Firebaseの管理画面で発行されるもの）
  const firebaseConfig = {
    authDomain: "crossmix.firebaseapp.com",
    projectId: "crossmix",
    storageBucket: "crossmix.firebasestorage.app",
    messagingSenderId: "415370806719",
    appId: "1:415370806719:web:ef91d96e673060a0520d0a"
  };

  // 上の設定でFirebaseに接続する
  const app = initializeApp(firebaseConfig);

  // データの保存場所(db)を用意し、他のファイル(functions.js)からも使えるように共有しておく
  // ※写真は Storage を使わず、縮小して Firestore に直接保存する（無料プランで完結）
  window.db = getFirestore(app);
</script>

  <!-- このアプリの動きをまとめたファイル（モジュール版で読み込む） -->
  <script type="module" src="functions.js"></script>
</body>
</html>
